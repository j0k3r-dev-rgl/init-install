##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Pavucontrol (volume control) as floating window
windowrule {
    name = float-pavucontrol
    match:class = org.pulseaudio.pavucontrol

    float = true
    size = 800 600
    center = true
}

# Other floating audio controls
windowrule {
    name = float-audio-controls
    match:class = (pwvucontrol|qpwgraph|helvum)

    float = yes
    size = 900 700
    center = yes
}

# Btop as floating window
windowrule {
    name = float-btop
    match:class = btop

    float = true
    size = 1000 700
    center = true
}

# Yazi for mounted drives as floating window
windowrule {
    name = float-yazi-usb
    match:class = yazi-usb

    float = true
    size = 1000 700
    center = true
}

# Quick note as floating window
windowrule {
    name = float-quick-notes
    match:class = quick-notes

    float = true
    size = 900 650
    center = true
}

# Quick terminal as floating window
windowrule {
    name = float-quick-terminal
    match:class = quick-terminal

    float = true
    size = 1000 600
    center = true
}

# Finder results as floating windows
windowrule {
    name = float-finder-tools
    match:class = (finder-nvim|finder-pi|finder-yazi)

    float = true
    size = 1100 720
    center = true
}

# ==================================================================================
# GOOGLE CHROME - Rules for notifications and pop-up windows (needs polish)
# ==================================================================================

# Chrome pop-up windows (Google login, confirmations, etc.)
windowrule {
    name = chrome-popup-windows
    match:class = google-chrome
    match:modal = true
    
    float = true
    center = true
    size = 600 700
}

# Floating Chrome notifications
windowrule {
    name = chrome-notifications
    match:class = ^(Google-chrome|chrome)$
    match:title = ^(.*notification.*|.*Notification.*|.*notificaci.*|.*Notificaci.*)$

    float = yes
    opacity = 0.95 0.95
    animation = popin
}

# Chrome modal dialogs (confirmations, alerts)
windowrule {
    name = chrome-modal-dialogs
    match:class = ^(Google-chrome|chrome)$
    match:modal = true

    float = yes
    center = yes
    opacity = 0.95 0.95
}

# Chrome screen sharing windows
windowrule {
    name = chrome-screen-share
    match:class = ^(Google-chrome|chrome)$
    match:title = ^(.*Choose.*|.*Share.*|.*sharing.*|.*screen.*|.*Screen.*)$

    float = yes
    center = yes
    size = 800 600
}

# Picture-in-Picture de Chrome
windowrule {
    name = chrome-pip
    match:class = ^(Google-chrome|chrome)$
    match:title = ^(Picture.in.Picture|Picture-in-Picture)$

    float = yes
    pin = yes
    opacity = 1.0 1.0
    no_blur = yes
}
