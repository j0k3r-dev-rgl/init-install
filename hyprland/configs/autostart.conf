#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# Las barras se lanzan por TTY desde init-install-autostart.

# Wallpaper aleatorio
exec-once = sh -c "$HOME/.config/wallpapers/random-wallpaper.sh"

# Network Manager Applet para gestión de red desde la bandeja del sistema
exec-once = nm-applet --indicator

# Montaje automático de USB y dispositivos extraíbles
exec-once = udiskie --tray

# GNOME Keyring Daemon
exec-once = dbus-update-activation-environment --all
exec-once = gnome-keyring-daemon --start --components=secrets

# >>> init-install autostart
exec-once = sh -c "$HOME/.local/bin/init-install-autostart"
# <<< init-install autostart
