[opener]
text = [
    { run = "/opt/nvim/bin/nvim %s", block = true, desc = "nvim" }
]
image = [
    { run = "imv %s", orphan = true, desc = "imv" }
]
video = [
    { run = "mpv %s", orphan = true, desc = "mpv" }
]
audio = [
    { run = "mpv %s", orphan = true, desc = "mpv" }
]
office = [
    { run = "onlyoffice-desktopeditors %s", orphan = true, desc = "OnlyOffice" }
]
browser = [
    { run = "google-chrome-stable %s", orphan = true, desc = "Chrome" }
]

[open]
rules = [
    # Imágenes → imv
    { mime = "image/*", use = "image" },

    # Video → mpv
    { mime = "video/*", use = "video" },

    # Audio → mpv
    { mime = "audio/*", use = "audio" },

    # Texto y código → nvim
    { mime = "text/*", use = "text" },
    { url = "*.sh", use = "text" },
    { url = "*.java", use = "text" },
    { url = "*.toml", use = "text" },
    { url = "*.yml", use = "text" },
    { url = "*.yaml", use = "text" },
    { url = "*.json", use = "text" },
    { url = "*.xml", use = "text" },
    { url = "*.env", use = "text" },
    { url = "Dockerfile*", use = "text" },
    { url = "*.dockerfile", use = "text" },
    { url = "*.conf", use = "text" },
    { url = "*.ini", use = "text" },
    { url = "*.md", use = "text" },

    # PDF → OnlyOffice
    { mime = "application/pdf", use = "office" },

    # Documentos Office (docx, xlsx, pptx, odt, etc.)
    { mime = "application/vnd.openxmlformats-officedocument.*", use = "office" },
    { mime = "application/openxmlformats-officedocument.*", use = "office" },
    { mime = "application/msword", use = "office" },
    { mime = "application/vnd.ms-*", use = "office" },
    { mime = "application/vnd.oasis.opendocument.*", use = "office" },
    { mime = "application/oasis.opendocument.*", use = "office" },
]
